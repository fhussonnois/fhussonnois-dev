baseURL: 'https://www.fhussonnois.dev'
languageCode: 'en-us'
title: 'Florian Hussonnois — Apache Kafka, Kestra & Data Streaming'

sitemap:
  changefreq: weekly
  priority: 0.5
  filename: sitemap.xml
defaultContentLanguage: "en"
enableRobotsTXT: true

social:
  github: "https://github.com/fhussonnois"
  twitter: "https://twitter.com/fhussonnois"
  stackoverflow: "https://stackoverflow.com/users/3660859/fhussonnois"
  linkedin: https://www.linkedin.com/in/florian-hussonnois/

# Site parameters
params:
  # Site Author
  author: Florian Hussonnois
  # Author biography
  bio: Random Thoughts about Software Engineering
  # Site Description, used in HTML meta
  description: "Florian Hussonnois — Lead Software Engineer at Kestra. Writing about Apache Kafka, data streaming, orchestration, and distributed system architectures."
  twitter: "@fhussonnois"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: catppuccin-mocha
    noClasses: true
    guessSyntax: true
    lineNos: false
